<!doctype html>
<html>

  <body>
    <h1>Hồ sơ thông tin cá nhân</h1>
    <fieldset>
      <legend>Thông tin cá nhân</legend>
      <label for="name">Tên:</label>
      <input id="name" type="text" placeholder="Nhập họ và tên" /><br />
      <label for="date">Ngày tháng năm sinh:</label>
      <input id="date" type="date" />
    </fieldset>
    <fieldset>
      <legend>Thông tin liên hệ</legend>
      <label for="email">Email:</label>
      <input id="email" type="text" placeholder="example@gmail.com" /><br />
      <label for="sdt">Số điện thoại</label>
      <input id="sdt" type="number" placeholder="0912345678" />
    </fieldset>
    Ghi chú bổ sung:<br />
    <textarea> </textarea>
  </body>
</html>
