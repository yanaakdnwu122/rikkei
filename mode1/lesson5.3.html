<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="lesson5.3.css">
  <title>Document</title>
</head>
<body>
  <div class="pricing-container">
    <div class="card">
        <h3 class="card-title">Cơ bản</h3>
        <p class="card-price">Miễn phí</p>
        <ul class="features">
            <li>1 Dự án</li>
            <li>100MB Lưu trữ</li>
            <li>Hỗ trợ Email</li>
        </ul>
        <button class="btn btn-dark">Bắt đầu ngay</button>
    </div>

    <div class="card featured">
        <h3 class="card-title">Chuyên nghiệp</h3>
        <p class="card-price">99.000đ/th</p>
        <ul class="features">
            <li>Dự án Không Giới Hạn</li>
            <li>10GB Lưu trữ</li>
            <li>Hỗ trợ 24/7</li>
            <li>Domain Tuỳ chỉnh</li>
        </ul>
        <button class="btn btn-light">Nâng Cấp</button>
    </div>

    <div class="card">
        <h3 class="card-title">Doanh nghiệp</h3>
        <p class="card-price">Liên hệ</p>
        <ul class="features">
            <li>Gói tuỳ chọn đầy đủ</li>
            <li>Dung lượng cao nhất</li>
            <li>Tư vấn riêng biệt</li>
        </ul>
        <button class="btn btn-dark">Tìm hiểu thêm</button>
    </div>
</div>
</body>
</html>
