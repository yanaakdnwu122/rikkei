<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiang Mai Card - Tailwind CSS Filters & Shadow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-sm rounded-xl shadow-md overflow-hidden border border-slate-100 transition-all hover:shadow-lg">
        
        <div class="w-full h-48 overflow-hidden bg-slate-200">
            <img src="https://images.unsplash.com/photo-1508009603885-50cf7c579365?w=600" 
                 class="w-full h-full object-cover brightness-110 transition-all duration-300 hover:brightness-100" 
                 alt="Cổng trời Chiang Mai">
        </div>

        <div class="p-5">
            <h3 class="text-slate-800 text-lg font-bold tracking-tight mb-1">
                Cổng trời Chiang Mai
            </h3>
            <p class="text-slate-400 text-sm font-medium">
                Thái Lan
            </p>
        </div>

    </div>

</body>
</html>
