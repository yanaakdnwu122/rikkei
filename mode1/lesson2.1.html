  <body>
    <h1>Bieu mau khao sat dich vu</h1>
    <label for="age">Độ tuổi của bạn:</label>
    <input id="age" type="number" /><br />
    <fieldset>
      <legend>Giới tính của bạn là gì?</legend>
      <label><input type="radio" /> Nam</label>
      <label><input type="radio" /> Nữ</label>
      <label><input type="radio" /> Khác</label>
    </fieldset>
    <fieldset>
      <legend>Dịch vụ bạn đang quan tâm (có thể chọn nhiều)</legend>
      <label><input type="checkbox" />Website</label>
      <label><input type="checkbox" />Mobile App</label>
      <label><input type="checkbox" />Marketing</label>
    </fieldset>
    Quốc gia đang sinh sống:
    <select>
      <option value="" disabled selected>---Vui lòng chọn---</option>
      <option>Việt Nam</option>
      <option>Nhật Bản</option>
      <option>Hoa Kỳ</option>
    </select>
    <br />
    <input type="button" value="Gửi thông tin" />
