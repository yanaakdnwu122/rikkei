<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch Vụ Đi Kèm - Bootstrap 5 Grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="lesson7.5.css">
</head>
<body>

    <section class="container my-5 py-4">
        <h2 class="text-center fw-bold mb-5 section-title">Dịch Vụ Đi Kèm</h2>
        
        <div class="row g-4 justify-content-center">
            
            <div class="col-12 col-sm-6 col-lg-3">
                <div class="card h-100 p-4 border-0 shadow-sm service-card">
                    <div class="icon-box mb-3 d-flex align-items-center justify-content-center rounded-3">
                        <i class="bi bi-house-door text-primary fs-5"></i>
                    </div>
                    <h5 class="fw-bold fs-6 mb-2 text-dark card-heading">Khách Sạn</h5>
                    <p class="text-muted small mb-0 lh-base">Hệ thống khách sạn chuẩn quốc tế cao cấp và tiện nghi.</p>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-3">
                <div class="card h-100 p-4 border-0 shadow-sm service-card">
                    <div class="icon-box mb-3 d-flex align-items-center justify-content-center rounded-3">
                        <i class="bi bi-triangle text-primary fs-5"></i>
                    </div>
                    <h5 class="fw-bold fs-6 mb-2 text-dark card-heading">Vé Máy Bay</h5>
                    <p class="text-muted small mb-0 lh-base">Đối tác từ các hãng hàng không hàng đầu thế giới.</p>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-3">
                <div class="card h-100 p-4 border-0 shadow-sm service-card">
                    <div class="icon-box mb-3 d-flex align-items-center justify-content-center rounded-3">
                        <i class="bi bi-shield-check text-primary fs-5"></i>
                    </div>
                    <h5 class="fw-bold fs-6 mb-2 text-dark card-heading">Bảo Hiểm</h5>
                    <p class="text-muted small mb-0 lh-base">Đảm bảo an toàn 100% trong mọi tình huống khẩn cấp.</p>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-3">
                <div class="card h-100 p-4 border-0 shadow-sm service-card">
                    <div class="icon-box mb-3 d-flex align-items-center justify-content-center rounded-3">
                        <i class="bi bi-people text-primary fs-5"></i>
                    </div>
                    <h5 class="fw-bold fs-6 mb-2 text-dark card-heading">Hướng Dẫn</h5>
                    <p class="text-muted small mb-0 lh-base">Đội ngũ hướng dẫn viên người bản địa giàu kinh nghiệm.</p>
                </div>
            </div>

        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
