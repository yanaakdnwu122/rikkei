<!DOCTYPE html>
<html lang="vi">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderlust Banner - Tailwind CSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen d-flex flex d-grid place-content-center p-4">

    <div class="bg-blue-700 text-center p-8 md:p-16 rounded-lg shadow-md max-w-4xl mx-auto">
        
        <h1 class="text-3xl md:text-5xl font-bold text-white mb-4 tracking-tight">
            Chào Mừng Đến Với Wanderlust
        </h1>
        
        <p class="text-sm md:text-base text-blue-200 max-w-2xl mx-auto leading-relaxed">
            Khám phá những vùng đất mới, trải nghiệm những nền văn hóa độc đáo và tận hưởng kỳ nghỉ tuyệt vời cùng chúng tôi.
        </p>

    </div>
