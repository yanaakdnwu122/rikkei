<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký nhận khuyến mãi</title>
    <link rel="stylesheet" href="lesson4.1.css">
</head>
<body>

    <div class="popup-container">
        <h2 class="popup-title">Đăng ký nhận khuyến mãi!</h2>
        <p class="popup-text">
            Nhập email của bạn để không bỏ lỡ những deal "Siêu Sale Công Nghệ" mới nhất từ chúng tôi.
        </p>
        
        <form class="popup-form">
            <input type="email" placeholder="Nhập địa chỉ email..." required>
            <button type="submit">Đăng ký ngay</button>
        </form>
    </div>

</body>
</html>
