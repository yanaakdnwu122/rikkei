<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tháng Đọc Sách - Bootstrap Typography & Images</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fcfbfa;
        }
        .banner-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .custom-title {
            color: #d9534f; 
        }
    </style>
</head>
<body>

    <div class="container my-5 text-center">
        <div class="banner-container">
            
            <h1 class="display-3 text-center text-danger mb-4 fw-light">Tháng Đọc Sách</h1>
            
            <div class="mb-3">
                <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=800" 
                     class="img-fluid rounded shadow-sm" 
                     alt="Hình ảnh minh họa thư viện sách">
            </div>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
