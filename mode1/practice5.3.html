<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thực Đơn Món Ăn</title>
    <link rel="stylesheet" href="practice5.3.css">
</head>
<body>

    <div class="menu-section">
        <h2 class="menu-title">Thực Đơn Của Chúng Tôi</h2>
        
        <div class="menu-container">
            <div class="menu-card">
                <div class="card-img">
                    <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=300" alt="Salad">
                </div>
                <h3>Salad Rau Củ Tươi</h3>
                <p class="price">45.000 VNĐ</p>
            </div>

            <div class="menu-card">
                <div class="card-img">
                    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300" alt="Cơm gạo lứt">
                </div>
                <h3>Cơm Gạo Lứt Bổ Dưỡng</h3>
                <p class="price">75.000 VNĐ</p>
            </div>

            <div class="menu-card">
                <div class="card-img">
                    <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300" alt="Pizza">
                </div>
                <h3>Pizza Hải Sản Phô Mai</h3>
                <p class="price">120.000 VNĐ</p>
            </div>

            <div class="menu-card">
                <div class="card-img">
                    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300" alt="Hamburger">
                </div>
                <h3>Hamburger Bò Úc</h3>
                <p class="price">85.000 VNĐ</p>
            </div>

            <div class="menu-card">
                <div class="card-img">
                    <img src="https://images.unsplash.com/photo-1544025162-d76694265947?w=300" alt="Sườn nướng">
                </div>
                <h3>Sườn Nướng BBQ</h3>
                <p class="price">150.000 VNĐ</p>
            </div>
        </div>
    </div>

</body>
</html>
