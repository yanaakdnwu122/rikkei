<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechGadget Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="lesson7.6.css">
</head>
<body>

    <div class="d-flex min-vh-100">
        
        <aside class="sidebar d-none d-md-block p-3 text-white flex-shrink-0">
            <h5 class="fw-bold px-2 py-3 mb-4 brand-logo">TechGadget Admin</h5>
            <ul class="nav flex-column gap-2">
                <li class="nav-item">
                    <a href="#" class="nav-link active rounded px-3 py-2">Tổng quan</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link text-white-50 px-3 py-2">Đơn hàng</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link text-white-50 px-3 py-2">Sản phẩm</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link text-white-50 px-3 py-2">Khách hàng</a>
                </li>
            </ul>
        </aside>

        <main class="main-content flex-grow-1 p-4 bg-light">
            
            <header class="mb-4">
                <input type="text" class="form-control search-input bg-white" placeholder="Tìm kiếm mã đơn hàng, sản phẩm...">
            </header>

            <h4 class="fw-bold text-dark mb-4 section-title">Tổng quan hệ thống</h4>

            <div class="row g-3">
                
                <div class="col-12 col-md-6 col-lg-3">
                    <div class="card stat-card p-3 border-0 shadow-sm h-100">
                        <span class="text-muted small fw-medium mb-1">Tổng doanh thu</span>
                        <h3 class="fw-bold text-dark m-0">125.000.000 đ</h3>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-3">
                    <div class="card stat-card p-3 border-0 shadow-sm h-100">
                        <span class="text-muted small fw-medium mb-1">Đơn hàng mới</span>
                        <h3 class="fw-bold text-dark m-0">342</h3>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-3">
                    <div class="card stat-card p-3 border-0 shadow-sm h-100">
                        <span class="text-muted small fw-medium mb-1">Khách hàng truy cập</span>
                        <h3 class="fw-bold text-dark m-0">1,204</h3>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-3">
                    <div class="card stat-card p-3 border-0 shadow-sm h-100">
                        <span class="text-muted small fw-medium mb-1">Tỉ lệ chuyển đổi</span>
                        <h3 class="fw-bold text-dark m-0">4.5%</h3>
                    </div>
                </div>

            </div> </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
