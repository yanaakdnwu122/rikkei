<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khám Phá Ngay - Tailwind CSS Hover & Transition</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-12 rounded-xl shadow-sm border border-slate-200/60 text-center max-w-sm w-100">
        
        <button class="bg-blue-100 text-blue-700 font-medium px-6 py-3 rounded-full 
                       hover:bg-blue-200 hover:text-blue-800
                       transition-colors duration-300 ease-in-out 
                       focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2">
            Khám phá ngay
        </button>

    </div>

</body>
</html>
