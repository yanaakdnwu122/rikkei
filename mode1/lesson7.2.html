<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm Kiếm Tour - Bootstrap 5 Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="lesson7.2.css">
</head>
<body>

    <div class="container my-5 d-flex justify-content-center">
        <div class="search-tour-box p-4 bg-white rounded shadow-sm border">
            
            <form class="row g-3 align-items-end">
                
                <div class="col-12 col-md-5">
                    <label for="destination" class="form-label fw-bold text-secondary">Điểm đến</label>
                    <input type="text" class="form-control py-2" id="destination" placeholder="Bạn muốn đi đâu?">
                </div>

                <div class="col-12 col-md-4">
                    <label for="departDate" class="form-label fw-bold text-secondary">Ngày đi</label>
                    <input type="date" class="form-control py-2" id="departDate">
                </div>

                <div class="col-12 col-md-3">
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold btn-search">Tìm kiếm</button>
                </div>

            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
