    <h1>Báo cáo tài chính năm</h1>

      <caption>
        Báo cáo doanh thu và lợi nhuận các quý trong năm
      </caption>

        <tr>
          <th scope="col">Chỉ tiêu</th>

          <th scope="col">Quý 4</th>
        </tr>

        <tr>
          <td scope="row">Doanh thu(tỷ VND)</td>
          <td>500</td>
          <td>650</td>
          <td>700</td>
          <td>850</td>
        </tr>
        <tr>
          <td scope="row">Lợi nhuận(tỷ VND)</td>
          <td>120</td>
          <td>180</td>
          <td>210</td>
          <td>250</td>
        </tr>
      </tbody>
    </table>
